<!DOCTYPE html>
<html>
<head>
    <title>Computation application mockup</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Computation application mockup</h1>
<p><b>Multi-Cat Household Territory Simulation</b></p>

<div class="container">

    <h3>Number of Cats</h3>
    <input type="number" id="numCats" placeholder="Enter number of cats">
    <button id="generateInputs">Generate Cat Inputs</button>

    <div id="catInputs"></div>

    <h3>Environment</h3>
    <input type="number" id="houseSize" placeholder="House Size (m²)">
    <input type="number" id="litterBoxes" placeholder="Number of Litter Boxes">
    <input type="number" id="feedingStations" placeholder="Number of Feeding Stations">

    <h3>Controls</h3>
    <button id="btnRun">Run Simulation</button>
    <button id="btnClear">Clear All</button>

    <h3>Outputs</h3>
    <textarea id="outputText" rows="6"></textarea>

    <canvas id="canvas" width="500" height="350"></canvas>

</div>

<script src="script.js" defer></script>

</body>
</html>
