<!DOCTYPE html>
<html>
<head>
    <title>Cat Behavior Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐱 Cat Behavior Pattern Analyzer</h1>

<div class="container">

    <h3>Input</h3>
    <textarea id="historyData" placeholder="Enter historical data..."></textarea>

    <input type="number" id="sleep" placeholder="Sleep hours">
    <input type="number" id="eat" placeholder="Feeding frequency">
    <input type="number" id="play" placeholder="Playtime duration">
    <input type="number" id="litter" placeholder="Litter box frequency">

    <h3>Process</h3>
    <button onclick="step1()">Step 1: Load Data</button>
    <button onclick="step2()">Step 2: Analyze Pattern</button>
    <button onclick="step3()">Step 3: Detect Anomaly</button>

    <h3>Output</h3>
    <textarea id="outputText" placeholder="Results..."></textarea>

    <canvas id="graphCanvas" width="400" height="200"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
