<!DOCTYPE html>
<html>
<head>
    <title>Multi-Cat Territory Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐱 Multi-Cat Territory Simulation (Mockup)</h1>

<div class="container">

    <h3>Input</h3>

    <input type="number" id="numCats" placeholder="Number of cats">

    <textarea id="catTraits" placeholder="Enter traits (dominance, stress, tolerance per cat)"></textarea>

    <input type="number" placeholder="House size (m^2)">
    <input type="number" placeholder="Number of litter boxes">
    <input type="number" placeholder="Feeding stations">

    <h3>Process</h3>
    <button onclick="step1()">Step 1: Initialize Agents</button>
    <button onclick="step2()">Step 2: Simulate Interaction</button>
    <button onclick="step3()">Step 3: Generate Results</button>

    <h3>Output</h3>

    <textarea id="outputText" placeholder="Simulation results..."></textarea>

    <canvas id="mapCanvas" width="400" height="250"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
