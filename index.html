<!DOCTYPE html>
<html>
<head>
    <title>Cat Space Analyzer 🐱</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
    <h1>🐱 Cat Space Analyzer</h1>

    <div id="step1" class="card">
        <h2>Jumlah Kucing</h2>
        <div class="row">
            <input type="number" id="catCount" min="1" placeholder="Masukkan jumlah">
            <button onclick="generateCatForms()">Next</button>
        </div>
    </div>

    <div id="step2" class="card"></div>

    <div id="step3" class="card" style="display:none;">
        <h2>Luas Rumah (m²)</h2>
        <div class="row">
            <input type="number" id="houseSize" placeholder="Contoh: 100">
            <button onclick="startSimulation()">Run Simulation</button>
        </div>
    </div>

    <canvas id="mapCanvas"></canvas>

    <div id="output" class="card"></div>
</div>

<script src="script.js"></script>
</body>
</html>
