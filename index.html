<!DOCTYPE html>
<html>
<head>
    <title>Cat Space Analyzer 🐱</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐱 Cat Space Analyzer</h1>

<div id="step1">
    <h2>Jumlah Kucing</h2>
    <input type="number" id="catCount" min="1">
    <button onclick="generateCatForms()">Next</button>
</div>

<div id="step2"></div>

<div id="step3" style="display:none;">
    <h2>Luas Rumah (m²)</h2>
    <input type="number" id="houseSize">
    <button onclick="startSimulation()">Run Simulation</button>
</div>

<canvas id="mapCanvas"></canvas>

<div id="output"></div>

<script src="script.js"></script>
</body>
</html>
