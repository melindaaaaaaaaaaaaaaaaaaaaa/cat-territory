<!DOCTYPE html>
<html>
<head>
    <title>Cat Space Analyzer 🐱</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🐱 Cat Space Analyzer</h1>

<div class="container">
    <h2>Tambah Kucing</h2>
    <input type="text" id="catName" placeholder="Nama kucing">
    <button onclick="addCat()">Tambah</button>
</div>

<div class="container">
    <h2>Tambah Resource</h2>
    <button onclick="addResource('food')">🍽️ Food</button>
    <button onclick="addResource('litter')">🚽 Litter</button>
</div>

<canvas id="mapCanvas" width="500" height="500"></canvas>

<div class="container">
    <button onclick="runSimulation()">▶️ Run Simulation</button>
    <button onclick="clearAll()">🧹 Clear</button>
</div>

<div id="output"></div>

<script src="script.js"></script>
</body>
</html>
